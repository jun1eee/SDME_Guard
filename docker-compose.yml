version: "3.8"

services:
  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/password123
    healthcheck:
      test: ["CMD", "sh", "-c", "echo 'RETURN 1' | cypher-shell -u neo4j -p password123 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - weddirect-net

  ai:
    build:
      context: ./ai
    container_name: ai
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    env_file:
      - ./ai/.env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PW=password123
      - TZ=Asia/Seoul
    ports:
      - "8000:8000"
    networks:
      - weddirect-net

  backend:
    build:
      context: ./be
    container_name: backend
    restart: unless-stopped
    depends_on:
      - ai
    env_file:
      - ./be/.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - TZ=Asia/Seoul
    ports:
      - "8080:8080"
    networks:
      - weddirect-net

  frontend:
    build:
      context: ./fe
    container_name: frontend
    env_file:
      - ./fe/.env
    environment:
      - BACKEND_URL=http://backend:8080
      - TZ=Asia/Seoul
    ports:
      - "3000:3000"
    networks:
      - weddirect-net

  mcp:
    build:
      context: ./mcp
    container_name: mcp
    restart: unless-stopped
    environment:
      - API_URL=http://backend:8080
      - MCP_PORT=3100
    ports:
      - "3100:3100"
    depends_on:
      - backend
    networks:
      - weddirect-net

  nginx:
    build:
      context: ./nginx
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - weddirect-net

networks:
  weddirect-net:
    driver: bridge

volumes:
  neo4j_data:

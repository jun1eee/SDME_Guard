version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: weddirect-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - weddirect-net

  backend:
    build:
      context: ./be
    container_name: weddirect-backend
    restart: unless-stopped
    env_file:
      - ./be/.env
    depends_on:
      - mysql
    networks:
      - weddirect-net

  frontend:
    build:
      context: ./fe
    container_name: weddirect-frontend
    expose:
      - "3000"
    networks:
      - weddirect-net

  nginx:
    image: nginx:alpine
    container_name: weddirect-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
    depends_on:
      - backend
      - frontend
    networks:
      - weddirect-net

volumes:
  mysql-data:

networks:
  weddirect-net:
    driver: bridge

version: "3.8"

services:
  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/password123
    networks:
      - weddirect-net

  ai:
    build:
      context: ./ai
    container_name: ai
    restart: unless-stopped
    depends_on:
      - neo4j
    env_file:
      - ./ai/.env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PW=password123
    ports:
      - "8000:8000"
    networks:
      - weddirect-net

  backend:
    build:
      context: ./be
    container_name: backend
    restart: unless-stopped
    depends_on:
      - ai
    env_file:
      - ./be/.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    ports:
      - "8080:8080"
    networks:
      - weddirect-net

  frontend:
    build:
      context: ./fe
    container_name: frontend
    env_file:
      - ./fe/.env
    environment:
      - BACKEND_URL=http://backend:8080
    ports:
      - "3000:3000"
    networks:
      - weddirect-net

  nginx:
    build:
      context: ./nginx
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - weddirect-net

networks:
  weddirect-net:
    driver: bridge

volumes:
  neo4j_data:
